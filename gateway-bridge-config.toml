# ChirpStack Gateway Bridge Configuration Example
# This is the configuration used for the Gateway Bridge BasicStation container
# IMPORTANT: Set marshaler="json" to enable JSON format instead of Protobuf

[integration]
marshaler="json"  # REQUIRED: Enable JSON marshaling

  [integration.mqtt.auth.generic]
  servers=["tcp://mosquitto:1883"]
  username=""
  password=""

  [integration.mqtt]
  event_topic_template="eu868/gateway/{{ .GatewayID }}/event/{{ .EventType }}"
  state_topic_template="eu868/gateway/{{ .GatewayID }}/state/{{ .StateType }}"
  command_topic_template="eu868/gateway/{{ .GatewayID }}/command/#"

[backend]
type="basic_station"

  [backend.basic_station]
  bind=":3001"
  tls_cert=""
  tls_key=""
  ca_cert=""
  region="EU868"  # Change to your region (US915, AU915, AS923, etc.)
  frequency_min=863000000
  frequency_max=870000000

  [[backend.basic_station.concentrators]]
    [backend.basic_station.concentrators.multi_sf]
    frequencies=[868100000,868300000,868500000,867100000,867300000,867500000,867700000,867900000]
  
    [backend.basic_station.concentrators.lora_std]
    frequency=868300000
    bandwidth=250000  
    spreading_factor=7
  
    [backend.basic_station.concentrators.fsk]
    frequency=868800000
